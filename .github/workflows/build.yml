name: Build and Deploy MyST Book

# Trigger the action when you push to the main branch
on:
  push:
    branches:
      - master  # Change to 'master' if your default branch is master

# Grant permissions needed to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Prevent concurrent builds from overwriting each other
    concurrency:
      group: "pages"
      cancel-in-progress: true

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Match this to your local Python version

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔨 Build MyST Book
        run: |
          jupyter book build --html

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # myst build --html outputs the website to the _build/html folder
          path: '_build/html'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4